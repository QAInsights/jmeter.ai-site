<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Welcome to JMeter.AI Blog">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#d500f9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)" opacity="0.4"/>

  <!-- Accent bar -->
  <rect x="80" y="470" width="200" height="4" fill="url(#accent)" rx="2"/>

  <!-- Faux waveform (perf test feel) -->
  <g stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.55">
    <path d="M80 380 L180 340 L220 360 L280 300 L340 330 L400 260 L460 310 L520 280 L600 340 L680 270 L760 320 L840 250 L920 320 L1000 290 L1080 330 L1120 310"/>
  </g>
  <g stroke="#d500f9" stroke-width="2" fill="none" opacity="0.35">
    <path d="M80 420 L180 400 L240 410 L300 370 L380 390 L440 360 L520 395 L600 370 L680 405 L760 380 L840 400 L920 375 L1000 400 L1080 385 L1120 395"/>
  </g>

  <!-- Title -->
  <text x="80" y="230" font-family="Orbitron, Inter, system-ui, sans-serif" font-weight="900" font-size="88" fill="#e2e8f0" letter-spacing="-1">
    JMeter<tspan fill="url(#accent)">.AI</tspan>
  </text>
  <text x="82" y="290" font-family="JetBrains Mono, ui-monospace, monospace" font-size="26" fill="#94a3b8" letter-spacing="2">
    AI-POWERED PERFORMANCE TESTING
  </text>

  <!-- Corner dots -->
  <circle cx="1100" cy="100" r="4" fill="#00e5ff"/>
  <circle cx="1120" cy="100" r="4" fill="#ffab00"/>
  <circle cx="1140" cy="100" r="4" fill="#00e676"/>
</svg>
